services:
  - type: web
    name: SunkenBot
    env: node
    plan: free
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: node start.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.x
      - key: NODE_OPTIONS
        value: --max-old-space-size=450
      - key: APPSTATE
        sync: false
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      - key: FERDEV_API_KEY
        sync: false
      - key: FERDEV_API_KEY2
        sync: false
      - key: FERDEV_API_KEY3
        sync: false
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
